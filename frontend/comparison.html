<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Players — Pigskin Almanac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030712; --surface: #0b1326; --surface2: #111827;
    --border: #1f2937; --text: #f8fafc; --muted: #9ca3af;
    --green: #10b981; --green2: #16a34a; --gold: #f59e0b; --red: #ef4444;
    --font-display: 'Barlow Condensed', serif;
    --font-body: 'Barlow', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh;
    background-image: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.03) 49px, rgba(255,255,255,0.03) 50px); }

  nav { position: sticky; top: 0; z-index: 50; background: rgba(3,7,18,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 56px; }
  .nav-logo { font-family: var(--font-display); font-size: 1.25rem; font-weight: 800; color: var(--text); text-decoration: none;
    display: flex; align-items: center; gap: 0.5rem; letter-spacing: 0.05em; }
  .nav-links { display: flex; gap: 0.25rem; margin-left: auto; }
  .nav-link { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); text-decoration: none; padding: 0.375rem 0.75rem;
    border-radius: 0.5rem; transition: all 0.15s; }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--green); }
  .nav-season { font-family: var(--font-mono); font-size: 0.75rem; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 0.25rem 0.6rem; border-radius: 0.5rem; cursor: pointer; }

  /* HERO */
  .hero { padding: 2.5rem 1.5rem 1.5rem;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(22,163,74,0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(251,191,36,0.08), transparent); }
  .hero-eyebrow { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: rgba(16,185,129,0.7); margin-bottom: 0.5rem; }
  .hero-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.03em; line-height: 1; }

  /* PICKERS */
  .pickers { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
  @media (max-width: 600px) { .pickers { grid-template-columns: 1fr; } }
  .picker { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem 1.25rem; position: relative; }
  .picker-label { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.5rem; }
  .picker-selected { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; min-height: 44px; }
  .picker-headshot { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--border); flex-shrink: 0; }
  .picker-name { font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; }
  .picker-meta { font-size: 0.72rem; color: var(--muted); }
  .picker-placeholder { font-family: var(--font-display); font-size: 0.9rem; color: var(--muted); font-style: italic; }
  .search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 0.5rem;
    padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.85rem; outline: none; transition: border-color 0.15s; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(16,185,129,0.5); }
  .search-dropdown { position: absolute; left: 1.25rem; right: 1.25rem; top: calc(100% - 4px);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 0.75rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; overflow: hidden; display: none; }
  .search-option { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.75rem;
    cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
  .search-option:last-child { border-bottom: none; }
  .search-option:hover { background: rgba(255,255,255,0.05); }
  .search-option img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
  .search-option-name { font-family: var(--font-display); font-weight: 700; font-size: 0.85rem; }
  .search-option-meta { font-size: 0.68rem; color: var(--muted); }

  /* COMPARE SECTION */
  .compare-section { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .section-eyebrow { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: rgba(16,185,129,0.7); }
  .section-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; }
  .card-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 0.75rem; }

  /* H2H TABLE */
  .h2h-table { width: 100%; border-collapse: collapse; }
  .h2h-table tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .h2h-table tr:last-child { border-bottom: none; }
  .h2h-table td { padding: 0.6rem 1.25rem; font-family: var(--font-mono); font-size: 0.85rem; }
  .h2h-label { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); text-align: center; }
  .h2h-val { text-align: center; min-width: 80px; }
  .h2h-val.winner { color: var(--gold); font-weight: 700; }
  .h2h-val.loser { color: var(--muted); }
  .h2h-player-header { background: rgba(255,255,255,0.03); }
  .h2h-player-header td { font-family: var(--font-display); font-weight: 800; font-size: 0.9rem;
    text-align: center; padding: 0.75rem 1.25rem; }

  /* CAREER TABLE */
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th { font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); text-align: right; }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody td { padding: 0.5rem 1rem; text-align: right; font-family: var(--font-mono); font-size: 0.78rem; }
  tbody td:first-child { text-align: left; font-family: var(--font-display); font-weight: 700; }

  .no-data { padding: 2rem; text-align: center; color: var(--muted); font-family: var(--font-display);
    font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .skeleton { border-radius: 0.5rem; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%; animation: shimmer 1.8s infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
</style>
</head>
<body>

<nav>
  <a href="dashboard.html" class="nav-logo">🏈 Pigskin Almanac</a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="team-details.html" class="nav-link">Teams</a>
    <a href="player-profile.html" class="nav-link">Players</a>
    <a href="comparison.html" class="nav-link active">Compare</a>
  </div>
  <select class="nav-season" id="seasonSelect"></select>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Head to Head</div>
  <div class="hero-title">Compare Players</div>
</div>

<div class="pickers">
  <!-- Player 1 -->
  <div class="picker" id="picker1">
    <div class="picker-label">Player 1</div>
    <div class="picker-selected" id="selected1"><span class="picker-placeholder">Search a player…</span></div>
    <input class="search-input" id="search1" type="text" placeholder="Search by name…" autocomplete="off">
    <div class="search-dropdown" id="dropdown1"></div>
  </div>
  <!-- Player 2 -->
  <div class="picker" id="picker2">
    <div class="picker-label">Player 2</div>
    <div class="picker-selected" id="selected2"><span class="picker-placeholder">Search a player…</span></div>
    <input class="search-input" id="search2" type="text" placeholder="Search by name…" autocomplete="off">
    <div class="search-dropdown" id="dropdown2"></div>
  </div>
</div>

<div class="compare-section" id="compareSection" style="display:none">
  <!-- H2H Stats -->
  <div class="card">
    <div class="card-header"><span class="section-eyebrow">Season</span><span class="section-title" id="h2hTitle">Head to Head</span></div>
    <div id="h2hContent"></div>
  </div>
  <!-- Career -->
  <div class="card">
    <div class="card-header"><span class="section-eyebrow">All Time</span><span class="section-title">Career Comparison</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
      <div style="border-right:1px solid var(--border)">
        <div style="padding:.6rem 1rem;font-family:var(--font-display);font-size:.75rem;font-weight:800;border-bottom:1px solid var(--border);text-transform:uppercase" id="careerHead1">—</div>
        <div id="career1Table"></div>
      </div>
      <div>
        <div style="padding:.6rem 1rem;font-family:var(--font-display);font-size:.75rem;font-weight:800;border-bottom:1px solid var(--border);text-transform:uppercase" id="careerHead2">—</div>
        <div id="career2Table"></div>
      </div>
    </div>
  </div>
</div>

<div id="emptyState" style="text-align:center;padding:4rem 1.5rem;color:var(--muted)">
  <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">Select Two Players</div>
  <div style="font-size:.9rem">Search for players above to start comparing</div>
</div>

<script>
  const urlP = new URLSearchParams(location.search);
  let SEASON = parseInt(urlP.get('season')) || 2024;
  let p1 = { id: urlP.get('p1'), name: '', pos: '' };
  let p2 = { id: urlP.get('p2'), name: '', pos: '' };
  const fmt = n => n == null ? '—' : Number(n).toLocaleString();
  const dec = (n, d=1) => n == null ? '—' : parseFloat(n).toFixed(d);

  const sel = document.getElementById('seasonSelect');
  for (let y = 2025; y >= 1999; y--) { const o = document.createElement('option'); o.value = o.textContent = y; sel.appendChild(o); }
  sel.value = SEASON;
  sel.addEventListener('change', e => { SEASON = parseInt(e.target.value); maybeCompare(); });

  // Setup search for both pickers
  function setupSearch(inputId, dropdownId, slot, onSelect) {
    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    let timer;
    input.addEventListener('input', () => {
      clearTimeout(timer);
      const q = input.value.trim();
      if (q.length < 2) { dropdown.style.display = 'none'; return; }
      timer = setTimeout(async () => {
        try {
          const rows = await fetch(`/api/players?search=${encodeURIComponent(q)}&limit=6`).then(r => r.json());
          dropdown.innerHTML = rows.length
            ? rows.map(p => `<div class="search-option" onclick="selectP(${slot}, '${p.gsis_id}', ${JSON.stringify(p.display_name)}, ${JSON.stringify(p.position||'')}, ${JSON.stringify(p.team_abbr||'')}, ${JSON.stringify(p.headshot||'')})">
                <img src="${p.headshot||''}" onerror="this.style.display='none'" alt="">
                <div><div class="search-option-name">${p.display_name}</div><div class="search-option-meta">${p.position||''} · ${p.team_abbr||''}</div></div>
              </div>`).join('')
            : '<div style="padding:.75rem;color:var(--muted);font-size:.85rem">No results</div>';
          dropdown.style.display = 'block';
        } catch(e) {}
      }, 300);
    });
    document.addEventListener('click', e => { if (!e.target.closest(`#picker${slot}`)) dropdown.style.display = 'none'; });
  }

  window.selectP = function(slot, id, name, pos, team, headshot) {
    const p = slot === 1 ? p1 : p2;
    p.id = id; p.name = name; p.pos = pos;
    document.getElementById(`dropdown${slot}`).style.display = 'none';
    document.getElementById(`search${slot}`).value = '';
    document.getElementById(`selected${slot}`).innerHTML = `
      <img class="picker-headshot" src="${headshot}" onerror="this.style.display='none'" alt="">
      <div><div class="picker-name">${name}</div><div class="picker-meta">${pos} · ${team}</div></div>`;
    maybeCompare();
  };

  setupSearch('search1', 'dropdown1', 1);
  setupSearch('search2', 'dropdown2', 2);

  async function maybeCompare() {
    if (!p1.id || !p2.id) return;
    history.replaceState(null, '', `?p1=${p1.id}&p2=${p2.id}&season=${SEASON}`);
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('compareSection').style.display = 'flex';
    document.getElementById('h2hTitle').textContent = `${SEASON} Head to Head`;
    document.getElementById('h2hContent').innerHTML = '<div class="skeleton" style="height:200px;margin:1rem"></div>';

    try {
      const data = await fetch(`/api/compare?p1=${p1.id}&p2=${p2.id}&season=${SEASON}`).then(r => r.json());
      renderH2H(data);
      renderCareer(data, 1);
      renderCareer(data, 2);
    } catch(e) {
      document.getElementById('h2hContent').innerHTML = '<div class="no-data">Failed to load comparison</div>';
    }
  }

  function renderH2H(data) {
    const s1 = data.player1.season; const s2 = data.player2.season;
    const b1 = data.player1.bio; const b2 = data.player2.bio;
    const pos = (b1?.position || b2?.position || '').toUpperCase();
    p1.pos = b1?.position || p1.pos;
    p2.pos = b2?.position || p2.pos;

    let stats = [];
    if (pos === 'QB') stats = [
      ['Games', 'games'], ['Pass Yards', 'passing_yards'], ['Pass TDs', 'passing_tds'],
      ['INTs', 'interceptions'], ['Completions', 'completions'], ['Attempts', 'attempts'],
      ['Rush Yards', 'rushing_yards'], ['Passer Rating', 'passer_rating'],
    ];
    else if (['RB','FB'].includes(pos)) stats = [
      ['Games', 'games'], ['Rush Yards', 'rushing_yards'], ['Rush TDs', 'rushing_tds'],
      ['Carries', 'carries'], ['Rec Yards', 'receiving_yards'], ['Receptions', 'receptions'],
      ['Fantasy PPR', 'fantasy_points_ppr'],
    ];
    else if (['WR','TE'].includes(pos)) stats = [
      ['Games', 'games'], ['Rec Yards', 'receiving_yards'], ['Rec TDs', 'receiving_tds'],
      ['Receptions', 'receptions'], ['Targets', 'targets'], ['Rush Yards', 'rushing_yards'],
      ['Fantasy PPR', 'fantasy_points_ppr'],
    ];
    else stats = [
      ['Games', 'games'], ['Pass Yards', 'passing_yards'], ['Rush Yards', 'rushing_yards'],
      ['Rec Yards', 'receiving_yards'], ['Fantasy PPR', 'fantasy_points_ppr'],
    ];

    const n1 = b1?.display_name || p1.name || 'P1';
    const n2 = b2?.display_name || p2.name || 'P2';

    if (!s1 && !s2) {
      document.getElementById('h2hContent').innerHTML = '<div class="no-data">No season stats available for this year</div>';
      return;
    }

    let html = `<table class="h2h-table">
      <tr class="h2h-player-header"><td class="h2h-val" style="text-align:left;padding-left:1.25rem">${n1}</td><td class="h2h-label">Stat</td><td class="h2h-val" style="text-align:right;padding-right:1.25rem">${n2}</td></tr>`;

    stats.forEach(([label, key]) => {
      const v1 = s1?.[key] ?? null; const v2 = s2?.[key] ?? null;
      const num1 = parseFloat(v1); const num2 = parseFloat(v2);
      const w1 = !isNaN(num1) && !isNaN(num2) && key !== 'interceptions' ? num1 >= num2 : false;
      const w2 = !isNaN(num1) && !isNaN(num2) && key !== 'interceptions' ? num2 > num1 : false;
      const intWin = key === 'interceptions';
      const c1 = intWin ? (num1 < num2 ? 'winner' : 'loser') : (w1 ? 'winner' : 'loser');
      const c2 = intWin ? (num2 < num1 ? 'winner' : 'loser') : (w2 ? 'winner' : 'loser');
      const fv1 = ['passer_rating','fantasy_points_ppr'].includes(key) ? dec(v1) : fmt(v1);
      const fv2 = ['passer_rating','fantasy_points_ppr'].includes(key) ? dec(v2) : fmt(v2);
      html += `<tr>
        <td class="h2h-val ${c1}" style="text-align:left;padding-left:1.25rem">${fv1}</td>
        <td class="h2h-label">${label}</td>
        <td class="h2h-val ${c2}" style="text-align:right;padding-right:1.25rem">${fv2}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('h2hContent').innerHTML = html;
  }

  function renderCareer(data, slot) {
    const career = data[`player${slot}`].career;
    const bio = data[`player${slot}`].bio;
    const name = bio?.display_name || (slot === 1 ? p1.name : p2.name) || `Player ${slot}`;
    const pos = (bio?.position || '').toUpperCase();
    document.getElementById(`careerHead${slot}`).textContent = name;

    const el = document.getElementById(`career${slot}Table`);
    if (!career?.length) { el.innerHTML = '<div class="no-data" style="font-size:.8rem">No data</div>'; return; }

    let headers, cells;
    if (pos === 'QB') {
      headers = ['Yr','G','Yds','TDs','INTs'];
      cells = r => [r.season, fmt(r.games), fmt(r.passing_yards), fmt(r.passing_tds), fmt(r.interceptions)];
    } else if (['RB','FB'].includes(pos)) {
      headers = ['Yr','G','Rush','TDs'];
      cells = r => [r.season, fmt(r.games), fmt(r.rushing_yards), fmt(r.rushing_tds)];
    } else if (['WR','TE'].includes(pos)) {
      headers = ['Yr','G','Rec','Yds','TDs'];
      cells = r => [r.season, fmt(r.games), fmt(r.receptions), fmt(r.receiving_yards), fmt(r.receiving_tds)];
    } else {
      headers = ['Yr','G','Yds','PPR'];
      cells = r => [r.season, fmt(r.games), fmt((r.passing_yards||0)+(r.rushing_yards||0)+(r.receiving_yards||0)), dec(r.fantasy_points_ppr)];
    }

    let html = `<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
    career.forEach(r => {
      const isCurrent = r.season === SEASON;
      html += `<tr style="${isCurrent ? 'background:rgba(16,185,129,0.06)' : ''}">
        ${cells(r).map((v,i) => `<td style="${i===0?'text-align:left;':''}">${v}</td>`).join('')}
      </tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  // Pre-load if URL has p1/p2
  async function preload() {
    if (!p1.id && !p2.id) return;
    const loads = [];
    if (p1.id) loads.push(fetch(`/api/players/${p1.id}`).then(r=>r.json()).then(d => {
      p1.name = d.display_name; p1.pos = d.position;
      document.getElementById('selected1').innerHTML = `
        <img class="picker-headshot" src="${d.headshot||''}" onerror="this.style.display='none'" alt="">
        <div><div class="picker-name">${d.display_name}</div><div class="picker-meta">${d.position||''} · ${d.team_abbr||''}</div></div>`;
    }).catch(()=>{}));
    if (p2.id) loads.push(fetch(`/api/players/${p2.id}`).then(r=>r.json()).then(d => {
      p2.name = d.display_name; p2.pos = d.position;
      document.getElementById('selected2').innerHTML = `
        <img class="picker-headshot" src="${d.headshot||''}" onerror="this.style.display='none'" alt="">
        <div><div class="picker-name">${d.display_name}</div><div class="picker-meta">${d.position||''} · ${d.team_abbr||''}</div></div>`;
    }).catch(()=>{}));
    await Promise.all(loads);
    maybeCompare();
  }
  preload();
</script>
</body>
</html>
