<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — Pigskin Almanac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030712; --surface: #0b1326; --surface2: #111827;
    --border: #1f2937; --text: #f8fafc; --muted: #9ca3af;
    --green: #10b981; --green2: #16a34a; --gold: #f59e0b; --red: #ef4444;
    --font-display: 'Barlow Condensed', serif;
    --font-body: 'Barlow', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh;
    background-image: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.03) 49px, rgba(255,255,255,0.03) 50px); }

  nav { position: sticky; top: 0; z-index: 50; background: rgba(3,7,18,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 56px; }
  .nav-logo { font-family: var(--font-display); font-size: 1.25rem; font-weight: 800; color: var(--text); text-decoration: none;
    display: flex; align-items: center; gap: 0.5rem; letter-spacing: 0.05em; }
  .nav-links { display: flex; gap: 0.25rem; margin-left: auto; }
  .nav-link { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); text-decoration: none; padding: 0.375rem 0.75rem;
    border-radius: 0.5rem; transition: all 0.15s; }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--green); }
  .nav-season { font-family: var(--font-mono); font-size: 0.75rem; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 0.25rem 0.6rem; border-radius: 0.5rem; cursor: pointer; }

  /* SEARCH */
  .search-bar { padding: 0.75rem 1.5rem; background: rgba(11,19,38,0.8); border-bottom: 1px solid var(--border); position: relative; }
  .search-input { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem;
    padding: 0.6rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem;
    transition: border-color 0.15s; outline: none; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(16,185,129,0.5); }
  .search-results { position: absolute; top: calc(100% - 2px); left: 1.5rem; width: min(480px, calc(100vw - 3rem));
    background: var(--surface2); border: 1px solid var(--border); border-radius: 0.75rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; overflow: hidden; display: none; }
  .search-result { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1rem;
    cursor: pointer; transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: rgba(255,255,255,0.05); }
  .search-result-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--border); }
  .search-result-name { font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; }
  .search-result-meta { font-size: 0.72rem; color: var(--muted); }

  /* HERO */
  .hero { padding: 2rem 1.5rem;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(22,163,74,0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(251,191,36,0.08), transparent); }
  .hero-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; }
  .hero-headshot { width: 90px; height: 90px; border-radius: 50%; object-fit: cover;
    background: var(--surface); border: 2px solid var(--border); }
  .hero-eyebrow { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: rgba(16,185,129,0.7); margin-bottom: 0.25rem; }
  .hero-name { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.03em; line-height: 1; }
  .hero-meta { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
  .hero-meta span { margin-right: 1rem; }

  /* MAIN */
  .main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 1.1rem 1.25rem;
    position: relative; overflow: hidden; background-image: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%); }
  .stat-card:hover { border-color: rgba(251,191,36,0.2); }
  .stat-value { font-family: var(--font-display); font-size: 2.25rem; font-weight: 900; line-height: 1; }
  .stat-label { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: rgba(255,255,255,0.4); margin-top: 0.4rem; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; }
  .card-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 0.75rem; }
  .section-eyebrow { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: rgba(16,185,129,0.7); }
  .section-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }

  /* TABLES */
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th { font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); padding: 0.5rem 1rem; text-align: right; border-bottom: 1px solid var(--border); }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody td { padding: 0.55rem 1rem; text-align: right; font-family: var(--font-mono); font-size: 0.78rem; }
  tbody td:first-child { text-align: left; font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; }

  .skeleton { border-radius: 0.5rem; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%; animation: shimmer 1.8s infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skel-row { height: 40px; margin: 2px 1rem; }
  .badge-win { display: inline-flex; border-radius: 0.25rem; padding: 0.1rem 0.4rem;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    background: rgba(16,185,129,0.2); color: #34d399; }
  .badge-loss { display: inline-flex; border-radius: 0.25rem; padding: 0.1rem 0.4rem;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    background: rgba(239,68,68,0.2); color: #f87171; }
</style>
</head>
<body>

<nav>
  <a href="dashboard.html" class="nav-logo">🏈 Pigskin Almanac</a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="team-details.html" class="nav-link">Teams</a>
    <a href="player-profile.html" class="nav-link active">Players</a>
    <a href="comparison.html" class="nav-link">Compare</a>
  </div>
  <select class="nav-season" id="seasonSelect">
    <option value="2024">2024</option><option value="2023">2023</option>
    <option value="2022">2022</option><option value="2021">2021</option><option value="2020">2020</option>
  </select>
</nav>

<div class="search-bar">
  <input class="search-input" id="searchInput" type="text" placeholder="Search players…" autocomplete="off">
  <div class="search-results" id="searchResults"></div>
</div>

<div class="hero" id="hero">
  <div class="hero-inner">
    <img class="hero-headshot" id="headshot" src="" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 90 90%22><rect fill=%22%231f2937%22 width=%2290%22 height=%2290%22/></svg>'">
    <div>
      <div class="hero-eyebrow" id="heroPos"></div>
      <div class="hero-name" id="heroName">Search for a player</div>
      <div class="hero-meta" id="heroMeta"></div>
    </div>
  </div>
</div>

<div class="main">
  <div>
    <div style="margin-bottom:.75rem"><span class="section-eyebrow">Season</span> <span class="section-title" id="statsTitle">Stats</span></div>
    <div class="stats-grid" id="statsGrid"><div class="stat-card skeleton" style="height:90px;"></div><div class="stat-card skeleton" style="height:90px;"></div><div class="stat-card skeleton" style="height:90px;"></div><div class="stat-card skeleton" style="height:90px;"></div></div>
  </div>

  <div class="card">
    <div class="card-header"><span class="section-eyebrow">History</span><span class="section-title">Career Stats</span></div>
    <div id="careerTable"><div class="skel-row skeleton"></div><div class="skel-row skeleton"></div><div class="skel-row skeleton"></div></div>
  </div>

  <div class="card">
    <div class="card-header"><span class="section-eyebrow">Weekly</span><span class="section-title">Game Log</span></div>
    <div id="gamelogTable"><div class="skel-row skeleton"></div><div class="skel-row skeleton"></div><div class="skel-row skeleton"></div></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(location.search);
  let PLAYER_ID = urlParams.get('id');
  let SEASON = parseInt(urlParams.get('season')) || 2024;
  let POSITION = '';
  const fmt = n => n == null ? '—' : Number(n).toLocaleString();
  const dec = (n, d=1) => n == null ? '—' : parseFloat(n).toFixed(d);

  document.getElementById('seasonSelect').value = SEASON;
  document.getElementById('seasonSelect').addEventListener('change', e => { SEASON = parseInt(e.target.value); if (PLAYER_ID) loadPlayer(); });

  // Search
  let searchTimer;
  const searchInput = document.getElementById('searchInput');
  const searchResultsEl = document.getElementById('searchResults');

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if (q.length < 2) { searchResultsEl.style.display = 'none'; return; }
    searchTimer = setTimeout(() => doSearch(q), 300);
  });

  document.addEventListener('click', e => { if (!e.target.closest('.search-bar')) searchResultsEl.style.display = 'none'; });

  async function doSearch(q) {
    try {
      const rows = await fetch(`/api/players?search=${encodeURIComponent(q)}&limit=8`).then(r => r.json());
      if (!rows.length) { searchResultsEl.innerHTML = '<div style="padding:.75rem 1rem;color:var(--muted);font-size:.85rem">No players found</div>'; }
      else searchResultsEl.innerHTML = rows.map(p => `
        <div class="search-result" onclick="selectPlayer('${p.gsis_id}')">
          <img class="search-result-img" src="${p.headshot||''}" onerror="this.style.display='none'" alt="">
          <div><div class="search-result-name">${p.display_name}</div><div class="search-result-meta">${p.position||''} · ${p.team_abbr||''}</div></div>
        </div>`).join('');
      searchResultsEl.style.display = 'block';
    } catch(e) {}
  }

  function selectPlayer(id) {
    PLAYER_ID = id;
    searchResultsEl.style.display = 'none';
    searchInput.value = '';
    history.replaceState(null, '', `?id=${id}&season=${SEASON}`);
    loadPlayer();
  }

  async function loadPlayer() {
    if (!PLAYER_ID) return;
    history.replaceState(null, '', `?id=${PLAYER_ID}&season=${SEASON}`);
    await Promise.all([loadBio(), loadStats(), loadCareer(), loadGamelog()]);
  }

  async function loadBio() {
    try {
      const p = await fetch(`/api/players/${PLAYER_ID}`).then(r => r.json());
      POSITION = p.position || '';
      document.title = `${p.display_name} — Pigskin Almanac`;
      document.getElementById('headshot').src = p.headshot || '';
      document.getElementById('heroPos').textContent = [p.position, p.team_abbr].filter(Boolean).join(' · ');
      document.getElementById('heroName').textContent = p.display_name || '—';
      document.getElementById('heroMeta').innerHTML = [
        p.height ? `<span>${p.height}</span>` : '',
        p.weight ? `<span>${p.weight} lbs</span>` : '',
        p.college ? `<span>${p.college}</span>` : '',
        p.years_of_experience != null ? `<span>${p.years_of_experience}yr exp</span>` : '',
      ].filter(Boolean).join('');
    } catch(e) {}
  }

  async function loadStats() {
    const el = document.getElementById('statsGrid');
    document.getElementById('statsTitle').textContent = `${SEASON} Stats`;
    try {
      const s = await fetch(`/api/players/${PLAYER_ID}/stats?season=${SEASON}`).then(r => r.json());
      if (!s) { el.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:.5rem">No stats for this season</p>'; return; }
      const pos = POSITION || s.position || '';
      let cards = [];
      if (['QB'].includes(pos)) cards = [
        ['Pass Yds', fmt(s.passing_yards)], ['Pass TDs', fmt(s.passing_tds)],
        ['INTs', fmt(s.interceptions)], ['Comp %', dec(s.completions && s.attempts ? s.completions/s.attempts*100 : null)+'%'],
        ['Rush Yds', fmt(s.rushing_yards)], ['Rating', dec(s.passer_rating)],
      ];
      else if (['RB','FB'].includes(pos)) cards = [
        ['Rush Yds', fmt(s.rushing_yards)], ['Rush TDs', fmt(s.rushing_tds)],
        ['Carries', fmt(s.carries)], ['YPC', dec(s.carries ? s.rushing_yards/s.carries : null)],
        ['Rec Yds', fmt(s.receiving_yards)], ['Receptions', fmt(s.receptions)],
      ];
      else if (['WR','TE'].includes(pos)) cards = [
        ['Rec Yds', fmt(s.receiving_yards)], ['Rec TDs', fmt(s.receiving_tds)],
        ['Receptions', fmt(s.receptions)], ['Targets', fmt(s.targets)],
        ['YPR', dec(s.receptions ? s.receiving_yards/s.receptions : null)], ['Games', fmt(s.games)],
      ];
      else cards = [
        ['Fantasy PPR', dec(s.fantasy_points_ppr)], ['Games', fmt(s.games)],
        ['Rush Yds', fmt(s.rushing_yards)], ['Rec Yds', fmt(s.receiving_yards)],
        ['Pass Yds', fmt(s.passing_yards)], ['TDs', fmt((s.rushing_tds||0)+(s.receiving_tds||0)+(s.passing_tds||0))],
      ];
      el.innerHTML = cards.map(([label, val]) => `
        <div class="stat-card"><div class="stat-value">${val}</div><div class="stat-label">${label}</div></div>`).join('');
    } catch(e) { el.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:.5rem">Failed to load</p>'; }
  }

  async function loadCareer() {
    const el = document.getElementById('careerTable');
    const pos = POSITION;
    try {
      const rows = await fetch(`/api/players/${PLAYER_ID}/career`).then(r => r.json());
      if (!rows.length) { el.innerHTML = '<p style="padding:1rem;color:var(--muted);font-size:.85rem">No career data</p>'; return; }
      let headers, cells;
      if (pos === 'QB') {
        headers = ['Season','Team','G','Pass Yds','TDs','INTs','Rating'];
        cells = r => [r.season, r.recent_team, fmt(r.games), fmt(r.passing_yards), fmt(r.passing_tds), fmt(r.interceptions), dec(r.passer_rating)];
      } else if (['RB','FB'].includes(pos)) {
        headers = ['Season','Team','G','Rush Yds','TDs','Car','Rec Yds'];
        cells = r => [r.season, r.recent_team, fmt(r.games), fmt(r.rushing_yards), fmt(r.rushing_tds), fmt(r.carries), fmt(r.receiving_yards)];
      } else if (['WR','TE'].includes(pos)) {
        headers = ['Season','Team','G','Rec Yds','TDs','Rec','Tgts'];
        cells = r => [r.season, r.recent_team, fmt(r.games), fmt(r.receiving_yards), fmt(r.receiving_tds), fmt(r.receptions), fmt(r.targets)];
      } else {
        headers = ['Season','Team','G','Pass Yds','Rush Yds','Rec Yds','Fant PPR'];
        cells = r => [r.season, r.recent_team, fmt(r.games), fmt(r.passing_yards), fmt(r.rushing_yards), fmt(r.receiving_yards), dec(r.fantasy_points_ppr)];
      }
      let html = `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      rows.forEach(r => {
        const isCurrent = r.season === SEASON;
        html += `<tr style="${isCurrent ? 'background:rgba(16,185,129,0.06)' : ''}">
          ${cells(r).map((v,i) => `<td style="${i<2?'text-align:left;':''}${isCurrent?'color:var(--text)':''}">${v}</td>`).join('')}
        </tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    } catch(e) { el.innerHTML = '<p style="padding:1rem;color:var(--muted);font-size:.85rem">Failed to load</p>'; }
  }

  async function loadGamelog() {
    const el = document.getElementById('gamelogTable');
    const pos = POSITION;
    try {
      const rows = await fetch(`/api/players/${PLAYER_ID}/gamelog?season=${SEASON}`).then(r => r.json());
      if (!rows.length) { el.innerHTML = '<p style="padding:1rem;color:var(--muted);font-size:.85rem">No game log data</p>'; return; }
      let headers, cells;
      if (pos === 'QB') {
        headers = ['Wk','Opp','Result','Pass Yds','TDs','INTs','Rating'];
        cells = r => [r.opponent_team, r.result, fmt(r.passing_yards), fmt(r.passing_tds), fmt(r.interceptions), dec(r.passer_rating)];
      } else if (['RB','FB'].includes(pos)) {
        headers = ['Wk','Opp','Result','Rush Yds','TDs','Car','Rec Yds'];
        cells = r => [r.opponent_team, r.result, fmt(r.rushing_yards), fmt(r.rushing_tds), fmt(r.carries), fmt(r.receiving_yards)];
      } else if (['WR','TE'].includes(pos)) {
        headers = ['Wk','Opp','Result','Rec Yds','TDs','Rec','Tgts'];
        cells = r => [r.opponent_team, r.result, fmt(r.receiving_yards), fmt(r.receiving_tds), fmt(r.receptions), fmt(r.targets)];
      } else {
        headers = ['Wk','Opp','Result','Pass Yds','Rush Yds','Rec Yds','Fant'];
        cells = r => [r.opponent_team, r.result, fmt(r.passing_yards), fmt(r.rushing_yards), fmt(r.receiving_yards), dec(r.fantasy_points_ppr)];
      }
      let html = `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      rows.forEach(r => {
        const result = r.result || '';
        const badge = result.startsWith('W') ? `<span class="badge-win">W</span>` : result.startsWith('L') ? `<span class="badge-loss">L</span>` : result || '—';
        const vals = cells(r);
        html += `<tr>
          <td style="text-align:left;font-family:var(--font-mono);font-size:.78rem">${r.week}</td>
          <td style="text-align:left;font-family:var(--font-display);font-weight:700">${vals[0] || '—'}</td>
          <td>${badge}</td>
          ${vals.slice(2).map(v => `<td>${v}</td>`).join('')}
        </tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    } catch(e) { el.innerHTML = '<p style="padding:1rem;color:var(--muted);font-size:.85rem">Failed to load</p>'; }
  }

  if (PLAYER_ID) loadPlayer();
</script>
</body>
</html>
